server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: BrowserRouter routes like /reports/:runId have no
    # matching file on disk — without this, refreshing on any route other
    # than "/" would 404 instead of letting React Router handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets get long-lived caching; index.html does not, so a new
    # deployment is picked up on next load rather than served stale from
    # a browser cache.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
